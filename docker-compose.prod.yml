services:
  postgres:
    image: postgres:18-alpine
    container_name: zoomap-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zoomap_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zoomap_pass_secure}
      POSTGRES_DB: zoomap_db
    ports:
      - "127.0.0.1:5432:5432"  # Только локальный доступ
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoomap_user -d zoomap_db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: zoomap-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Только через nginx
    environment:
      DATABASE_URL: "postgresql://zoomap_user:${POSTGRES_PASSWORD:-zoomap_pass_secure}@postgres:5432/zoomap_db"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: zoomap-frontend
    restart: unless-stopped
    expose:
      - "80"  # Только внутренний доступ
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: zoomap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"  # Для HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL сертификаты
      - ./back/uploads:/app/uploads:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata: