<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Зверь сбежал! | ZooVerse</title>
<style>
  :root {
    --color-forest-400: oklch(0.2776 0.0445 144.26);
    --color-forest-300: oklch(0.3774 0.0598 144.28);
    --color-forest-200: oklch(0.5413 0.0931 130.75);
    --color-forest-100: oklch(0.7907 0.1268 125.09);

    --color-moss: #2d4a2d;
    --color-sage: #5c7a3e;
    --color-lime: #a8c96b;

    --color-cream-100: oklch(0.9568 0.0119 79.78);
    --color-sand-100: oklch(0.8883 0.0503 88.08);

    --color-terracotta: #c4602a;
    --color-amber: #e8933a;
    --color-white: #fdfaf5;

    --color-text: #1a1a18;
    --color-muted: #6b6b5a;

    --radius-box: 16px;
    --ease-smooth: cubic-bezier(0.25, 0.8, 0.25, 1);
    --duration-smooth: 0.45s;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(ellipse at top left, var(--color-forest-300), var(--color-forest-400) 60%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    color: var(--color-white);
  }

  /* Фоновые листья */
  .leaf {
    position: absolute;
    opacity: 0.08;
    pointer-events: none;
    animation: float 8s ease-in-out infinite;
  }
  .leaf:nth-child(1) { top: 10%; left: 8%; animation-delay: 0s; }
  .leaf:nth-child(2) { top: 70%; right: 10%; animation-delay: 2s; }
  .leaf:nth-child(3) { bottom: 15%; left: 15%; animation-delay: 4s; }
  .leaf:nth-child(4) { top: 20%; right: 20%; animation-delay: 1s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }

  /* Следы животных */
  .paw {
    position: absolute;
    width: 30px;
    height: 30px;
    opacity: 0.15;
    background: var(--color-lime);
    border-radius: 50%;
    filter: blur(1px);
  }
  .paw::before, .paw::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    background: var(--color-lime);
    border-radius: 50%;
  }
  .paw::before { top: -8px; left: 3px; }
  .paw::after { top: -8px; right: 3px; }

  .paw-1 { top: 30%; left: 5%; transform: rotate(-30deg); }
  .paw-2 { top: 45%; left: 12%; transform: rotate(-20deg); }
  .paw-3 { top: 60%; left: 8%; transform: rotate(-40deg); }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 720px;
    position: relative;
    z-index: 2;
  }

  /* Большие цифры 404 */
  .error-code {
    font-size: clamp(8rem, 20vw, 14rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.04em;
    position: relative;
    display: inline-block;
    background: linear-gradient(135deg, var(--color-lime) 0%, var(--color-forest-100) 50%, var(--color-amber) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  /* Лисёнок SVG */
  .fox-container {
    position: absolute;
    top: -20px;
    right: -60px;
    width: 140px;
    height: 140px;
    animation: peek 5s ease-in-out infinite;
  }

  @keyframes peek {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-10px) rotate(5deg); }
  }

  .fox-eye {
    animation: blink 4s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }

  .fox-tail {
    transform-origin: 30px 100px;
    animation: wag 2s ease-in-out infinite;
  }
  @keyframes wag {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(15deg); }
  }

  .title {
    font-size: clamp(1.5rem, 4vw, 2.25rem);
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--color-white);
  }

  .title span {
    color: var(--color-amber);
    font-style: italic;
  }

  .subtitle {
    font-size: clamp(1rem, 2vw, 1.15rem);
    color: var(--color-forest-100);
    margin-bottom: 2.5rem;
    line-height: 1.6;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 1rem 2rem;
    border-radius: 999px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    transition: all var(--duration-smooth) var(--ease-smooth);
    cursor: pointer;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn-primary {
    background: var(--color-lime);
    color: var(--color-forest-400);
  }
  .btn-primary:hover {
    background: var(--color-white);
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .btn-secondary {
    background: transparent;
    color: var(--color-white);
    border: 2px solid var(--color-forest-100);
  }
  .btn-secondary:hover {
    background: var(--color-forest-100);
    color: var(--color-forest-400);
    transform: translateY(-3px);
  }

  /* Карточка-подсказка */
  .hint-card {
    margin-top: 3rem;
    padding: 1.25rem 1.75rem;
    background: rgba(253, 250, 245, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(168, 201, 107, 0.2);
    border-radius: var(--radius-box);
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.95rem;
    color: var(--color-cream-100);
  }
  .hint-card .dot {
    width: 8px;
    height: 8px;
    background: var(--color-amber);
    border-radius: 50%;
    animation: blink-dot 2s ease-in-out infinite;
  }
  @keyframes blink-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @media (max-width: 600px) {
    .fox-container {
      right: -20px;
      width: 100px;
      height: 100px;
    }
  }
</style>
</head>
<body>

  <!-- Декоративные листья -->
  <svg class="leaf" width="80" height="80" viewBox="0 0 24 24" fill="currentColor">
    <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
  </svg>
  <svg class="leaf" width="60" height="60" viewBox="0 0 24 24" fill="currentColor">
    <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
  </svg>
  <svg class="leaf" width="100" height="100" viewBox="0 0 24 24" fill="currentColor">
    <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
  </svg>
  <svg class="leaf" width="50" height="50" viewBox="0 0 24 24" fill="currentColor">
    <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
  </svg>

  <!-- Следы -->
  <div class="paw paw-1"></div>
  <div class="paw paw-2"></div>
  <div class="paw paw-3"></div>

  <div class="container">
    <div style="position: relative; display: inline-block;">
      <div class="error-code">404</div>
      
      <!-- Милый лисёнок -->
      <svg class="fox-container" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <!-- Хвост -->
        <g class="fox-tail">
          <path d="M20 90 Q10 70 25 55 Q35 50 35 65 Q35 80 30 90 Z" fill="#c4602a"/>
          <path d="M22 85 Q18 75 26 62 Q30 60 30 68 Q30 78 27 85 Z" fill="#fdfaf5"/>
        </g>
        <!-- Тело -->
        <ellipse cx="60" cy="95" rx="28" ry="18" fill="#c4602a"/>
        <ellipse cx="60" cy="100" rx="20" ry="10" fill="#fdfaf5"/>
        <!-- Голова -->
        <circle cx="60" cy="60" r="28" fill="#c4602a"/>
        <!-- Уши -->
        <path d="M38 45 L32 22 L50 38 Z" fill="#c4602a"/>
        <path d="M82 45 L88 22 L70 38 Z" fill="#c4602a"/>
        <path d="M40 42 L36 28 L48 38 Z" fill="#fdfaf5"/>
        <path d="M80 42 L84 28 L72 38 Z" fill="#fdfaf5"/>
        <!-- Мордочка -->
        <ellipse cx="60" cy="70" rx="18" ry="14" fill="#fdfaf5"/>
        <!-- Нос -->
        <ellipse cx="60" cy="65" rx="4" ry="3" fill="#1a1a18"/>
        <!-- Щёчки -->
        <circle cx="48" cy="68" r="3" fill="#e8933a" opacity="0.5"/>
        <circle cx="72" cy="68" r="3" fill="#e8933a" opacity="0.5"/>
        <!-- Глаза -->
        <g class="fox-eye">
          <circle cx="50" cy="55" r="4" fill="#1a1a18"/>
          <circle cx="51" cy="54" r="1.5" fill="#fdfaf5"/>
        </g>
        <g class="fox-eye">
          <circle cx="70" cy="55" r="4" fill="#1a1a18"/>
          <circle cx="71" cy="54" r="1.5" fill="#fdfaf5"/>
        </g>
        <!-- Рот -->
        <path d="M56 72 Q60 75 64 72" stroke="#1a1a18" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="title">Упс! Этот зверь <span>сбежал</span></h1>
    <p class="subtitle">
      Похоже, страница, которую вы ищете, затерялась в джунглях. 
      Наши смотрители уже отправились на поиски!
    </p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <span></span> Вернуться в зоопарк
      </a>
      <a href="javascript:history.back()" class="btn btn-secondary">
        ← Назад
      </a>
    </div>

    <div class="hint-card">
      <span class="dot"></span>
      <span>Смотритель выехал на поиски • Обычно занимает ~2 мин</span>
    </div>
  </div>

  <script>
    // Пасхалка: лисёнок реагирует на движение мыши
    const fox = document.querySelector('.fox-container');
    const code = document.querySelector('.error-code');
    
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 10;
      fox.style.transform = `translate(${x}px, ${y}px) rotate(${x * 0.3}deg)`;
      code.style.textShadow = `${-x * 0.5}px ${-y * 0.5}px 0 rgba(232, 147, 58, 0.3)`;
    });

    // Клик по лисёнку — он "убегает"
    fox.style.cursor = 'pointer';
    fox.addEventListener('click', () => {
      fox.style.transition = 'all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1)';
      fox.style.transform = 'translate(200px, -100px) rotate(45deg)';
      fox.style.opacity = '0';
      setTimeout(() => {
        fox.style.transform = '';
        fox.style.opacity = '1';
        fox.style.transition = '';
      }, 1500);
    });
  </script>
</body>
</html>
