services:
  postgres:
    image: postgres:18-alpine
    container_name: zoomap-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zoomap_user
      POSTGRES_PASSWORD: zoomap_pass
      POSTGRES_DB: zoomap_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoomap_user -d zoomap_db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./back
    container_name: zoomap-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://zoomap_user:zoomap_pass@postgres:5432/zoomap_db"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./back:/app
      - backend_node_modules:/app/node_modules
      - /app/.git
      - /app/.env
      - ./back/uploads:/app/uploads
    command: >
      sh -c "npx drizzle-kit push && npx tsx watch src/index.ts"

  # ✅ Adminer - работает локально без прокси
  adminer:
    image: adminer
    container_name: zoomap-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./front
    container_name: zoomap-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./front:/app
      - frontend_node_modules:/app/node_modules
      - /app/.git
    command: npm run dev -- --host 0.0.0.0

  nginx:
    image: nginx:alpine
    container_name: zoomap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./back/uploads:/app/uploads:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules: