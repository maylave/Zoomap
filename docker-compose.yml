services:
  postgres:
    image: postgres:18-alpine
    container_name: zoomap-db
    restart: always
    environment:
      POSTGRES_USER: zoomap_user
      POSTGRES_PASSWORD: zoomap_pass
      POSTGRES_DB: zoomap_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoomap_user -d zoomap_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./back
    container_name: zoomap-backend
    restart: always
    ports:
      - "3000:3000"
      - "4983:4983"
    environment:
      DATABASE_URL: "postgresql://zoomap_user:zoomap_pass@postgres:5432/zoomap_db"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./back:/app
      - backend_node_modules:/app/node_modules
      - /app/.git
      - /app/.env
    command: >
      sh -c "npx drizzle-kit push && npx tsx watch src/index.ts"

volumes:
  pgdata:
  backend_node_modules: